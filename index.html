<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🎭 Times Up!</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;0,900;1,700&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg:     #16302a;
  --bg2:    #0e2218;
  --felt:   #1d4a3a;
  --gold:   #d4a84b;
  --gold-l: #f0c870;
  --cream:  #faf4e1;
  --cream-d:#ede3c2;
  --dark:   #1a1a1a;
  --light:  #faf4e1;
  --t1: #c0392b; --t2: #2471a3; --t3: #6c3483;
  --ok: #27ae60; --ko: #c0392b;
  --r: 14px;
  --sh: 0 8px 32px rgba(0,0,0,0.5);
  --sh-card: 0 12px 40px rgba(0,0,0,0.6), 0 2px 8px rgba(0,0,0,0.3);
}
body {
  font-family: 'DM Sans', sans-serif;
  background: var(--bg);
  color: var(--light);
  min-height: 100vh;
  background-image:
    radial-gradient(ellipse at 15% 25%, rgba(212,168,75,0.07) 0%, transparent 55%),
    radial-gradient(ellipse at 85% 75%, rgba(212,168,75,0.05) 0%, transparent 55%),
    repeating-linear-gradient(45deg, transparent, transparent 40px, rgba(255,255,255,0.008) 40px, rgba(255,255,255,0.008) 41px);
}
#app { min-height: 100vh; display: flex; flex-direction: column; }

/* ── SCREEN ── */
.screen {
  flex: 1; display: flex; flex-direction: column; align-items: center;
  padding: 1.5rem 1rem 2rem; max-width: 680px; margin: 0 auto; width: 100%; gap: 1rem;
}
.screen-wide { max-width: 960px; }

/* ── TYPE ── */
h1 { font-family: 'Playfair Display', serif; font-weight: 900; color: var(--gold);
     font-size: clamp(2.8rem, 9vw, 5.5rem); text-align: center; line-height: 1;
     text-shadow: 0 4px 20px rgba(0,0,0,0.5); }
h2 { font-family: 'Playfair Display', serif; font-size: 1.6rem; color: var(--gold-l); }
.subtitle { color: rgba(250,244,225,0.65); text-align: center; font-size: 1rem; }

/* ── LAYOUT ── */
.stack { display: flex; flex-direction: column; gap: 0.85rem; width: 100%; }
.row   { display: flex; gap: 0.75rem; width: 100%; align-items: center; }
.center{ text-align: center; display: flex; flex-direction: column; align-items: center; gap: 1rem; }
.sep   { width:100%; height:1px; background: rgba(212,168,75,0.18); }
.top-bar {
  display: flex; align-items: center; justify-content: space-between;
  width: 100%; padding: 0 0 0.5rem;
}

/* ── CARD ── */
.panel {
  background: rgba(255,255,255,0.06); border: 1px solid rgba(212,168,75,0.25);
  border-radius: var(--r); padding: 1rem 1.25rem; width: 100%;
}
.word-card {
  width: 100%; max-width: 380px; aspect-ratio: 3/2;
  background: var(--cream); color: var(--dark);
  border-radius: 20px; border: 4px solid var(--gold);
  box-shadow: var(--sh-card);
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  position: relative; overflow: hidden; flex-shrink: 0;
}
.word-card::before {
  content: '♦'; position: absolute; top: 12px; left: 14px;
  color: var(--gold); font-size: 1.1rem; opacity: 0.4;
}
.word-card::after {
  content: '♦'; position: absolute; bottom: 12px; right: 14px;
  color: var(--gold); font-size: 1.1rem; opacity: 0.4; transform: rotate(180deg);
}
.word-card .word {
  font-family: 'Playfair Display', serif; font-size: clamp(1.8rem,6vw,2.8rem);
  font-weight: 700; text-align: center; padding: 1rem 1.5rem; line-height: 1.2;
}
.word-card .deck-label {
  position: absolute; bottom: 14px; left: 50%; transform: translateX(-50%);
  font-size: 0.68rem; color: rgba(0,0,0,0.35); text-transform: uppercase;
  letter-spacing: 2px; font-weight: 700; white-space: nowrap;
}
.word-card-back {
  width: 100%; max-width: 380px; aspect-ratio: 3/2;
  background: linear-gradient(135deg, var(--felt) 0%, var(--bg2) 100%);
  border-radius: 20px; border: 4px solid var(--gold);
  box-shadow: var(--sh-card);
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  gap: 0.75rem; cursor: pointer; transition: transform 0.2s;
  background-image: repeating-linear-gradient(45deg,transparent,transparent 8px,rgba(212,168,75,0.04) 8px,rgba(212,168,75,0.04) 9px);
}
.word-card-back:hover { transform: scale(1.02); }
.word-card-back .reveal-text {
  font-family: 'Playfair Display', serif; font-size: 1.1rem; color: var(--gold);
  text-align: center; padding: 0 1.5rem;
}

/* ── BUTTONS ── */
.btn {
  display: inline-flex; align-items: center; justify-content: center; gap: 0.4rem;
  padding: 0.7rem 1.4rem; border: none; border-radius: 12px;
  font-family: 'DM Sans', sans-serif; font-size: 0.95rem; font-weight: 600;
  cursor: pointer; transition: all 0.14s ease; text-decoration: none; white-space: nowrap;
}
.btn:active { transform: scale(0.96); }
.btn-gold    { background: var(--gold); color: var(--dark); }
.btn-gold:hover { background: var(--gold-l); }
.btn-outline { background: transparent; border: 2px solid var(--gold); color: var(--gold); }
.btn-outline:hover { background: rgba(212,168,75,0.12); }
.btn-ghost   { background: transparent; color: rgba(250,244,225,0.55); font-size: 0.9rem; }
.btn-ghost:hover { color: var(--light); }
.btn-danger  { background: var(--ko); color: white; }
.btn-danger:hover { background: #e74c3c; }
.btn-ok  { background: var(--ok); color: white; flex:1; padding:1rem; font-size:1.1rem; border-radius:14px; }
.btn-ok:hover  { background: #2ecc71; }
.btn-ko  { background: var(--ko); color: white; flex:1; padding:1rem; font-size:1.1rem; border-radius:14px; }
.btn-ko:hover  { background: #e74c3c; }
.btn-skip{ background: rgba(255,255,255,0.12); color: white; border: 2px solid rgba(255,255,255,0.25); flex:1; padding:1rem; font-size:1.1rem; border-radius:14px; }
.btn-skip:hover{ background: rgba(255,255,255,0.2); }
.btn-lg  { padding: 1.1rem 2.2rem; font-size: 1.1rem; border-radius: 16px; }
.btn-full{ width: 100%; }

/* ── TIMER ── */
.timer-wrap { position: relative; width: 110px; height: 110px; flex-shrink: 0; }
.timer-svg  { transform: rotate(-90deg); }
.timer-bg   { fill: none; stroke: rgba(255,255,255,0.08); stroke-width: 9; }
.timer-arc  { fill: none; stroke: var(--gold); stroke-width: 9; stroke-linecap: round; transition: stroke-dashoffset 1s linear, stroke 0.3s; }
.timer-num  {
  position: absolute; inset: 0; display: flex; align-items: center; justify-content: center;
  font-family: 'Playfair Display', serif; font-size: 2rem; font-weight: 900; color: var(--gold);
}

/* ── BADGES ── */
.round-badge {
  background: rgba(212,168,75,0.15); border: 2px solid var(--gold); color: var(--gold);
  padding: 0.3rem 1rem; border-radius: 30px; font-size: 0.8rem; font-weight: 700;
  text-transform: uppercase; letter-spacing: 1px;
}
.score-pill {
  padding: 0.35rem 0.9rem; border-radius: 30px; font-weight: 700;
  font-size: 0.9rem; color: white; white-space: nowrap;
}
.score-row { display: flex; gap: 0.5rem; flex-wrap: wrap; justify-content: center; }
.team-banner {
  display: flex; align-items: center; gap: 0.75rem; padding: 0.6rem 1.2rem;
  border-radius: 40px; font-weight: 700; font-size: 1rem; color: white;
}

/* ── FORMS ── */
.form-group { display: flex; flex-direction: column; gap: 0.35rem; width: 100%; }
.form-label {
  font-size: 0.78rem; font-weight: 700; text-transform: uppercase;
  letter-spacing: 1.2px; color: var(--gold);
}
input[type="text"], textarea, select {
  background: rgba(255,255,255,0.07); border: 2px solid rgba(255,255,255,0.12);
  border-radius: 10px; padding: 0.65rem 0.9rem; color: var(--light);
  font-family: 'DM Sans', sans-serif; font-size: 0.95rem; width: 100%;
  transition: border-color 0.2s;
}
input:focus, textarea:focus, select:focus { outline: none; border-color: var(--gold); }
textarea { resize: vertical; min-height: 100px; }
select option { background: var(--bg2); }
.check-row {
  display: flex; align-items: center; gap: 0.75rem; background: rgba(255,255,255,0.06);
  border-radius: 10px; padding: 0.7rem 1rem; cursor: pointer; transition: background 0.15s;
}
.check-row:hover { background: rgba(255,255,255,0.1); }
.check-row input[type="checkbox"] { width:18px; height:18px; accent-color: var(--gold); flex-shrink:0; }
.check-row label { cursor: pointer; font-weight: 500; flex:1; }

/* ── NUM PICKER ── */
.num-picker { display: flex; align-items: center; gap: 0.75rem; }
.num-picker button {
  width: 34px; height: 34px; border-radius: 50%; border: 2px solid var(--gold);
  background: transparent; color: var(--gold); font-size: 1.1rem; cursor: pointer;
  display: flex; align-items: center; justify-content: center; font-weight: 700;
  transition: all 0.14s;
}
.num-picker button:hover { background: var(--gold); color: var(--dark); }
.num-picker .val {
  font-family: 'Playfair Display', serif; font-size: 1.6rem; font-weight: 900;
  color: var(--gold); min-width: 2rem; text-align: center;
}

/* ── DECK LIST ── */
.deck-row {
  display: flex; align-items: center; justify-content: space-between; gap: 1rem;
  background: rgba(255,255,255,0.06); border: 1px solid rgba(212,168,75,0.2);
  border-radius: var(--r); padding: 0.85rem 1rem; cursor: pointer; transition: all 0.15s;
  width: 100%;
}
.deck-row:hover { background: rgba(255,255,255,0.11); border-color: var(--gold); }

/* ── PREVIEW GRID ── */
.prev-grid {
  display: grid; grid-template-columns: repeat(auto-fill, minmax(130px, 1fr));
  gap: 0.75rem; width: 100%;
}
.prev-mini {
  background: var(--cream); color: var(--dark); border-radius: 10px;
  border: 2px solid var(--gold); padding: 0.85rem 0.6rem; text-align: center;
  font-family: 'Playfair Display', serif; font-weight: 700; font-size: 0.95rem;
  line-height: 1.3;
}

/* ── SCORE TABLE ── */
.score-table { width: 100%; max-width: 440px; display: flex; flex-direction: column; gap: 0.6rem; }
.score-row-item {
  display: flex; align-items: center; justify-content: space-between;
  padding: 0.85rem 1.25rem; border-radius: var(--r); color: white;
  font-size: 1.1rem; font-weight: 700;
}

/* ── ANIMATIONS ── */
.fade { animation: fadeIn 0.28s ease; }
@keyframes fadeIn { from {opacity:0;transform:translateY(6px)} to {opacity:1;transform:translateY(0)} }
.pop { animation: popIn 0.35s cubic-bezier(0.34,1.56,0.64,1); }
@keyframes popIn { from {opacity:0;transform:scale(0.7)} to {opacity:1;transform:scale(1)} }
.flip { animation: flipIn 0.4s ease; }
@keyframes flipIn { 0%{opacity:0;transform:perspective(600px) rotateY(80deg) scale(0.85)} 100%{opacity:1;transform:perspective(600px) rotateY(0) scale(1)} }

/* ── PRINT ── */
@media print {
  body { background: white !important; }
  .no-print { display: none !important; }
  #app { display: block; }
  .print-grid {
    display: grid; grid-template-columns: repeat(4, 1fr);
    gap: 6px; padding: 8px; width: 100%;
  }
  .print-card {
    aspect-ratio: 5/3; border: 2px solid #c9a048; border-radius: 8px;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    padding: 6px; break-inside: avoid; background: #fdf8ee; color: #1a1a1a;
    position: relative;
  }
  .print-card::before, .print-card::after {
    content: '♦'; position: absolute; color: #c9a048; font-size: 9pt; opacity: 0.45;
  }
  .print-card::before { top:4px; left:6px; }
  .print-card::after  { bottom:4px; right:6px; transform:rotate(180deg); }
  .print-word { font-family:'Playfair Display',serif; font-size: 13pt; font-weight:700; text-align:center; }
  .print-deck { font-size:6.5pt; color:#aaa; text-transform:uppercase; letter-spacing:1px; margin-top:3px; font-weight:700; }
  .print-num  { position:absolute; top:4px; right:6px; font-size:6pt; color:#ccc; }
}
.print-grid {
  display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px;
  padding: 1rem; width: 100%; max-width: 900px;
}
.print-card {
  aspect-ratio: 5/3; border: 2px solid var(--gold); border-radius: 10px;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  padding: 10px; background: var(--cream); color: var(--dark); position: relative;
}
.print-word { font-family:'Playfair Display',serif; font-size:clamp(0.85rem,1.8vw,1.1rem); font-weight:700; text-align:center; line-height:1.2; }
.print-deck { font-size:0.62rem; color:rgba(0,0,0,0.38); text-transform:uppercase; letter-spacing:1.5px; margin-top:5px; font-weight:700; }
.print-num  { position:absolute; top:5px; right:7px; font-size:0.6rem; color:rgba(0,0,0,0.2); }
</style>
</head>
<body>
<div id="app"></div>

<script>
// ══════════════════════════════════════════════════════
//  CONSTANTS & STATE
// ══════════════════════════════════════════════════════
const TEAM_COLORS = ['#c0392b','#2471a3','#6c3483'];
const TEAM_NAMES  = ['Squadra A','Squadra B','Squadra C'];
const CIRC = 2 * Math.PI * 50;

const $ = id => document.getElementById(id);
const el = (tag, cls, html) => { const e=document.createElement(tag); if(cls)e.className=cls; if(html)e.innerHTML=html; return e; };

let S = {
  decks: JSON.parse(localStorage.getItem('tu_decks') || 'null') || getDefaultDecks(),
  screen: 'home',
  setup: null,
  printDeckIds: [],
  printCount: 40,
};

let G = null; // game state

function getDefaultDecks() {
  return [
    { id:'d_cinema', name:'🎬 Cinema',
      words:'Matrix,Titanic,Avatar,Toy Story,Il Padrino,Frozen,Interstellar,Joker,Aladin,Bambi,Jurassic Park,Shrek,Il Re Leone,Cenerentola,Spider-Man,Batman,Superman,E.T.,Grease,Flashdance,Dirty Dancing,Pretty Woman,Forrest Gump,Rain Man,Rocky,Terminator,Ghostbusters,Beetlejuice,Edward mani di forbice,Hook'.split(',') },
    { id:'d_animali', name:'🐾 Animali',
      words:'elefante,giraffa,coccodrillo,fenicottero,pinguino,koala,pangolino,platypus,iguana,cobra,anaconda,piranha,picchio,pavone,cicogna,falco,barbagianni,axolotl,capibara,ocelot,ghepardo,ippopotamo,rinoceronte,cammello,lama,alpaca,tapiro,ornitorinco,formichiere,bradipo'.split(',') },
    { id:'d_famosi', name:'👤 Personaggi Famosi',
      words:'Leonardo da Vinci,Cleopatra,Napoleone,Einstein,Mozart,Beethoven,Giulio Cesare,Marco Polo,Colombo,Galileo,Darwin,Newton,Shakespeare,Dante,Picasso,Van Gogh,Michelangelo,Raffaello,Platone,Aristotele,Socrate,Alessandro Magno,Giulietta,Romeo,Cenerentola,Pinocchio,Alice,Sherlock Holmes,Robinson Crusoe,Don Chisciotte'.split(',') },
    { id:'d_oggetti', name:'🏠 Oggetti di Casa',
      words:'frullatore,lavastoviglie,aspirapolvere,phon,microonde,tostapane,bollitore,ferro da stiro,centrifuga,frigorifero,congelatore,ventilatore,umidificatore,deumidificatore,termosifone,trapano,cacciavite,martello,metro,livella,cazzuola,pennello,scala,carriola,vanga'.split(',') },
  ];
}

function saveDecks() { localStorage.setItem('tu_decks', JSON.stringify(S.decks)); }
function shuffle(a) { const r=[...a]; for(let i=r.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[r[i],r[j]]=[r[j],r[i]];} return r; }
function go(screen) { S.screen = screen; render(); window.scrollTo(0,0); }

// ══════════════════════════════════════════════════════
//  RENDER DISPATCHER
// ══════════════════════════════════════════════════════
function render() {
  const app = $('app');
  app.innerHTML = '';
  app.appendChild(SCREENS[S.screen]());
}

// ══════════════════════════════════════════════════════
//  SCREEN BUILDERS
// ══════════════════════════════════════════════════════
const SCREENS = {};

// ── HOME ──────────────────────────────────────────────
SCREENS.home = () => {
  const d = div('screen center fade');
  const totalWords = S.decks.reduce((s,d)=>s+d.words.length,0);
  d.innerHTML = `
    <div style="margin-top:1.5rem">
      <div style="font-size:4rem;line-height:1">🎭</div>
      <h1 style="margin-top:0.5rem">Times Up!</h1>
      <p class="subtitle" style="margin-top:0.4rem">Descrivi · Mimica · Vinci</p>
    </div>
    <div class="stack" style="max-width:340px;margin-top:1rem">
      <button class="btn btn-gold btn-lg btn-full" onclick="go('setup')">🎮 Nuova Partita</button>
      <button class="btn btn-outline btn-lg btn-full" onclick="go('deckManager')">📚 Gestisci Mazzi</button>
      <button class="btn btn-outline btn-lg btn-full" onclick="go('printSetup')">🖨️ Stampa Carte</button>
    </div>
    <p style="opacity:0.35;font-size:0.82rem;margin-top:2rem">
      ${S.decks.length} mazzi · ${totalWords} parole disponibili
    </p>`;
  return d;
};

// ── DECK MANAGER ──────────────────────────────────────
SCREENS.deckManager = () => {
  const d = div('screen fade');
  let inner = `
    <div class="top-bar">
      <button class="btn btn-ghost" onclick="go('home')">← Indietro</button>
      <h2>📚 Mazzi</h2>
      <button class="btn btn-gold" onclick="deckNew()">+ Nuovo</button>
    </div>`;
  if (!S.decks.length) {
    inner += `<div class="center" style="margin-top:3rem;opacity:0.5"><div style="font-size:3rem">📦</div><p>Nessun mazzo ancora.<br>Creane uno!</p></div>`;
  } else {
    inner += `<div class="stack">` + S.decks.map(dk => `
      <div class="deck-row" onclick="deckEdit('${dk.id}')">
        <div>
          <div style="font-weight:700">${dk.name}</div>
          <div style="font-size:0.8rem;opacity:0.5;margin-top:2px">${dk.words.length} parole</div>
        </div>
        <div style="display:flex;gap:0.5rem">
          <button class="btn btn-outline" style="padding:0.3rem 0.7rem;font-size:0.8rem" onclick="event.stopPropagation();deckEdit('${dk.id}')">✏️</button>
          <button class="btn btn-danger" style="padding:0.3rem 0.7rem;font-size:0.8rem" onclick="event.stopPropagation();deckDelete('${dk.id}')">🗑️</button>
        </div>
      </div>`).join('') + `</div>`;
  }
  d.innerHTML = inner;
  return d;
};

// ── DECK EDIT ─────────────────────────────────────────
SCREENS.deckEdit = () => {
  const dk = S._editId ? S.decks.find(d=>d.id===S._editId) : null;
  const d = div('screen fade');
  d.innerHTML = `
    <div class="top-bar">
      <button class="btn btn-ghost" onclick="go('deckManager')">← Annulla</button>
      <h2>${dk ? '✏️ Modifica' : '➕ Nuovo Mazzo'}</h2>
      <button class="btn btn-gold" onclick="deckSave()">Salva ✓</button>
    </div>
    <div class="stack">
      <div class="form-group">
        <div class="form-label">Nome del Mazzo</div>
        <input type="text" id="dkName" placeholder="es. 🎬 Cinema" value="${dk ? esc(dk.name) : ''}">
      </div>
      <div class="form-group">
        <div class="form-label">Parole <span id="wc" style="opacity:0.5;text-transform:none;letter-spacing:0">${dk ? `(${dk.words.length})` : '(0)'}</span></div>
        <textarea id="dkWords" placeholder="gatto, cane, elefante, leone, tigre..."
          oninput="document.getElementById('wc').textContent='('+this.value.split(',').map(w=>w.trim()).filter(w=>w).length+')'">
${dk ? dk.words.join(', ') : ''}</textarea>
      </div>
      <div class="panel" style="font-size:0.88rem;opacity:0.65;line-height:1.6">
        💡 <strong>Suggerimento:</strong> inserisci almeno 40 parole per un mazzo completo. 
        Puoi selezionare più mazzi al setup di gioco per creare un mazzo combinato.
      </div>
    </div>`;
  return d;
};

// ── SETUP ─────────────────────────────────────────────
SCREENS.setup = () => {
  if (!S.setup) S.setup = {
    deckIds: [], numTeams: 2, numPlayers: 2,
    teamNames: ['Squadra A','Squadra B','Squadra C'],
    cardCount: 40,
  };
  const st = S.setup;
  const avail = st.deckIds.reduce((s,id)=>{const dk=S.decks.find(d=>d.id===id);return s+(dk?dk.words.length:0);},0);

  const d = div('screen fade');
  let inner = `
    <div class="top-bar">
      <button class="btn btn-ghost" onclick="go('home')">← Indietro</button>
      <h2>⚙️ Setup Gioco</h2>
    </div>
    <div class="stack" style="gap:1.4rem">`;

  // Decks
  inner += `<div class="form-group">
    <div class="form-label">📚 Mazzi da Usare</div>`;
  if (!S.decks.length) {
    inner += `<div class="panel" style="opacity:0.6">Nessun mazzo. <button class="btn btn-outline" style="padding:0.3rem 0.7rem;font-size:0.82rem;margin-left:0.5rem" onclick="go('deckManager')">Crea uno</button></div>`;
  } else {
    inner += S.decks.map(dk => `
      <div class="check-row">
        <input type="checkbox" id="ck_${dk.id}" ${st.deckIds.includes(dk.id)?'checked':''} onchange="toggleDeck('${dk.id}')">

  </div>`;

  // Players
  inner += `<div class="form-group">
    <div class="form-label">🧑 Giocatori per Squadra</div>
    <div class="num-picker">
      <button onclick="adjSetup('numPlayers',-1,1,8)">−</button>
      <span class="val">${st.numPlayers}</span>
      <button onclick="adjSetup('numPlayers',1,1,8)">+</button>
    </div>
  </div>`;

  // Team names
  inner += `<div class="form-group">
    <div class="form-label">🏷️ Nomi Squadre</div>
    <div class="stack" style="gap:0.5rem">` +
    Array.from({length:st.numTeams},(_,i)=>`

    + `</div></div>`;

  inner += `<button class="btn btn-gold btn-lg btn-full" style="margin-top:0.5rem" onclick="startGame()">
    🎮 Inizia il Gioco

  d.innerHTML = inner;
  return d;
};

// ══════════════════════════════════════════════════════
//  HELPERS
// ══════════════════════════════════════════════════════
function div(cls) { const d=document.createElement('div'); d.className=cls; return d; }
function esc(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

// ══════════════════════════════════════════════════════
//  DECK ACTIONS
// ══════════════════════════════════════════════════════
function deckNew()       { S._editId=null; go('deckEdit'); }
function deckEdit(id)    { S._editId=id;   go('deckEdit'); }
function deckDelete(id)  {
  if(!confirm('Eliminare questo mazzo?')) return;
  S.decks = S.decks.filter(d=>d.id!==id); saveDecks(); render();
}
function deckSave() {
  const name  = ($('dkName').value||'').trim();
  const words = ($('dkWords').value||'').split(',').map(w=>w.trim()).filter(Boolean);
  if (!name)         { alert('Inserisci un nome.'); return; }
  if (!words.length) { alert('Inserisci almeno una parola.'); return; }
  if (S._editId) {
    const dk = S.decks.find(d=>d.id===S._editId);
    dk.name=name; dk.words=words;
  } else {
    S.decks.push({ id:'d_'+Date.now(), name, words });
  }
  saveDecks(); go('deckManager');
}

// ══════════════════════════════════════════════════════
//  SETUP ACTIONS
// ══════════════════════════════════════════════════════
function toggleDeck(id) {
  const ids = S.setup.deckIds;
  const i = ids.indexOf(id);
  if (i>=0) ids.splice(i,1); else ids.push(id);
  render();
}
function adjSetup(k,d,mn,mx) {
  S.setup[k] = Math.max(mn, Math.min(mx, S.setup[k]+d));
  render();
}
function adjPrint(d) {
  S.printCount = Math.max(10, Math.min(500, S.printCount+d));
  render();
}
function togglePrintDeck(id) {
  const i = S.printDeckIds.indexOf(id);
  if (i>=0) S.printDeckIds.splice(i,1); else S.printDeckIds.push(id);
}

// ══════════════════════════════════════════════════════
//  GAME START
// ══════════════════════════════════════════════════════
function startGame() {
  const st = S.setup;
  if (!st.deckIds.length) { alert('Seleziona almeno un mazzo!'); return; }

  // Collect words
  let pool = [];
  st.deckIds.forEach(id => {
    const dk = S.decks.find(d=>d.id===id);
    if (dk) dk.words.forEach(w=>pool.push({w,dk:dk.name}));
  });
  if (pool.length < 5) { alert('Servono almeno 5 parole.'); return; }
  pool = shuffle(pool).slice(0, st.cardCount);

  // Build teams
  const teams = Array.from({length:st.numTeams},(_,i)=>({
    name: st.teamNames[i]||TEAM_NAMES[i],
    color: TEAM_COLORS[i],
    players: Array.from({length:st.numPlayers},(_,j)=>`Giocatore ${j+1}`),
    pi: 0,
  }));

  // Preview distribution
  const totalP = st.numTeams * st.numPlayers;
  const sp = shuffle([...pool]);
  const previewQ = [];
  let ci = 0;
  for (let p=0; p<st.numPlayers; p++) {
    for (let t=0; t<st.numTeams; t++) {
      const n = Math.floor(pool.length/totalP) + (ci < pool.length%totalP ? 1 : 0);
      previewQ.push({ ti:t, name:teams[t].players[p], cards:sp.slice(ci,ci+n).map(o=>o.w) });
      ci += n;
    }
  }

  // deckMap: word → deck name
  const deckMap = {};
  pool.forEach(o=>{ deckMap[o.w]=o.dk; });

  G = {
    teams,
    allCards: pool.map(o=>o.w),
    deckMap,
    deck: [],
    won: Array.from({length:st.numTeams},()=>[]),
    ti: 0,           // current team index
    round: 1,
    tLeft: 60, tMax: 60,
    tInt: null,
    cur: null, curDeck: null, revealed: false,
    previewQ, previewIdx: 0,
    r1Scores: null,
    total: pool.length,
  };

  go('previewIntro');
}

// ══════════════════════════════════════════════════════
//  PREVIEW
// ══════════════════════════════════════════════════════
function previewDone() {
  G.previewIdx++;
  if (G.previewIdx >= G.previewQ.length) {
    // Start game
    G.deck = shuffle([...G.allCards]);
    go('roundStart');
  } else {
    go('previewIntro');
  }
}

// ══════════════════════════════════════════════════════
//  TIMER
// ══════════════════════════════════════════════════════
function startTimer() {
  clearInterval(G.tInt);
  G.tInt = setInterval(() => {
    G.tLeft--;
    updateTimer();
    if (G.tLeft <= 0) turnEnd();
  }, 1000);
}

function updateTimer() {
  const arc = $('tArc'), num = $('tNum');
  if (!arc||!num) return;
  const frac = G.tLeft/G.tMax;
  arc.style.strokeDashoffset = (1-frac)*CIRC;
  const col = G.tLeft<=10 ? '#e74c3c' : G.tLeft<=20 ? '#e67e22' : 'var(--gold)';
  arc.style.stroke = col;
  num.textContent  = G.tLeft;
  num.style.color  = col;
}

// ══════════════════════════════════════════════════════
//  TURN
// ══════════════════════════════════════════════════════
function turnStart() {
  G.tLeft = G.tMax;
  nextCard();
  go('playing');
  startTimer();
}

function nextCard() {
  if (G.deck.length > 0) {
    G.cur = G.deck.pop();
    G.curDeck = G.deckMap[G.cur]||'';
    G.revealed = false;
  } else {
    G.cur = null; G.curDeck = null;
  }
}

function revealCard() {
  G.revealed = true;
  render();
  updateTimer();
}

function cardOk() {
  if (!G.cur) return;
  G.won[G.ti].push(G.cur);
  G.cur = null;
  if (allGuessed()) { clearInterval(G.tInt); endRound(); return; }
  nextCard();
  render(); updateTimer();
}

function cardSkip() {
  if (!G.cur) return;
  G.deck.unshift(G.cur); // bottom of deck
  G.cur = null;
  nextCard();
  render(); updateTimer();
}

function cardWrong() {
  if (!G.cur) return;
  G.deck.unshift(G.cur); // back to deck
  G.cur = null;
  nextCard();
  render(); updateTimer();
}

function allGuessed() {
  return G.won.reduce((s,p)=>s+p.length,0) >= G.total;
}

function turnEnd() {
  clearInterval(G.tInt);
  if (G.cur) { G.deck.unshift(G.cur); G.cur=null; }
  go('turnEnd');
}

function turnEndEarly() { turnEnd(); }

function nextTeam() {
  // Advance player for current team
  const t = G.teams[G.ti];
  t.pi = (t.pi+1) % t.players.length;
  G.ti = (G.ti+1) % G.teams.length;

  if (G.deck.length === 0) { endRound(); return; }
  go('turnIntro');
}

// ══════════════════════════════════════════════════════
//  ROUND MANAGEMENT
// ══════════════════════════════════════════════════════
function endRound() { go('roundEnd'); }

function startRound2() {
  G.r1Scores = G.teams.map((_,i)=>G.won[i].length);
  G.deck = shuffle([...G.allCards]);
  G.won  = Array.from({length:G.teams.length},()=>[]);
  G.teams.forEach(t=>t.pi=0);
  G.ti = 0; G.round = 2;
  go('roundStart');
}

function showFinal() { go('final'); }

function playAgain() {
  // Reset game but keep same setup
  G = null;
  startGame();
}

// ══════════════════════════════════════════════════════
//  INIT
// ══════════════════════════════════════════════════════
render();
</script>
